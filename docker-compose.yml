services:
  # S3 Viewer Application
  s3-viewer:
    build: .
    ports:
      - "3000:3000"
    environment:
      - SESSION_SECRET=dev-secret-change-in-production-32chars!
      - ORIGIN=http://localhost:3000
      - PORT=3000
      - HOST=0.0.0.0
      # - S3_DEFAULT_ENDPOINT=http://minio:9000  # Pre-fills endpoint in login form
      # - S3_DEFAULT_REGION=us-east-1
      # Fixed credentials mode (skip login form):
      # - S3_ACCESS_KEY=minioadmin
      # - S3_SECRET_KEY=minioadmin
      # - S3_ENDPOINT=http://minio:9000
      # - S3_REGION=us-east-1
      # - S3_SESSION_TOKEN=          # Optional: for STS temporary credentials
      # OIDC / SSO login (Okta, Keycloak, Authentik, Azure AD, Google, etc.):
      # - OIDC_ISSUER=https://your-idp.example.com
      # - OIDC_CLIENT_ID=your-client-id
      # - OIDC_CLIENT_SECRET=your-client-secret
      # - OIDC_SCOPES=openid profile email
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      minio:
        condition: service_healthy

  # MinIO - S3-compatible object storage for testing
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MinIO Client - Creates a test bucket with sample data on startup
  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/test-bucket;
      mc mb --ignore-existing local/demo-data;
      echo 'Hello from S3 Viewer!' > /tmp/hello.txt;
      echo '{\"name\": \"test\", \"version\": 1}' > /tmp/test.json;
      mc cp /tmp/hello.txt local/test-bucket/hello.txt;
      mc cp /tmp/test.json local/test-bucket/test.json;
      mc cp /tmp/hello.txt local/test-bucket/documents/readme.txt;
      mc cp /tmp/test.json local/test-bucket/documents/config/settings.json;
      mc cp /tmp/hello.txt local/demo-data/sample.txt;
      echo 'Setup complete!';
      "

volumes:
  minio-data:
