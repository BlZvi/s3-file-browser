name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Start MinIO and seed test data
        run: |
          chmod +x e2e/seed-bulk-data.sh
          docker compose -f e2e/docker-compose.e2e.yml up -d --wait
          # Wait for seed to complete
          docker compose -f e2e/docker-compose.e2e.yml logs -f minio-seed 2>&1 | head -100
          # Give it a moment to finish
          sleep 5

      - name: Verify MinIO is ready
        run: |
          curl -sf http://localhost:9000/minio/health/live || (echo "MinIO not ready" && exit 1)

      - name: Run E2E tests
        run: npx playwright test
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Teardown MinIO
        if: always()
        run: docker compose -f e2e/docker-compose.e2e.yml down -v
